Baker Street Inquiries:
  description: "Michelle Birkby's series puts Mrs. Hudson and Mary Watson centre stage. Tired of being sidelined, they quietly form their own detective agency — and find they're rather good at it."

John Gardner's Moriarty:
  description: "A rare villain-centred take: the Napoleon of Crime is forced into an uneasy alliance with a rival American criminal mastermind. Holmes is barely present — this is Moriarty's story."

Mary Russell:
  description: "Laurie R. King's long-running series follows Mary Russell — sharp, independent, and Holmes's intellectual equal — who becomes his partner and eventually his wife. The cases range from Sussex to Jerusalem to India."

Mr. Mycroft:
  description: "HF Heard's 1940s pastiche places a retired Holmes in the English countryside under the alias Mr. Donahue — keeping bees, keeping a low profile, and still quietly solving the odd rural mystery."

Nicholas Meyer Holmes Novels:
  description: "Nicholas Meyer's standalone novels, presented as rediscovered Watson manuscripts, helped spark the modern Holmes pastiche revival. Grounded, literary, and genuinely surprising."

The Classified Dossier:
  description: "Christian Klaver sends Holmes and Watson into gothic crossover territory — facing Count Dracula, Dorian Gray, and other icons of Victorian fiction. Dark, playful, and unapologetically weird."

The Extraordinary Adventures of the Athena Club:
  description: "Theodora Goss assembles the daughters of Victorian science's most infamous men — Jekyll, Moreau, Frankenstein — into an unlikely sisterhood that investigates crime across Europe. Lush and inventive."
